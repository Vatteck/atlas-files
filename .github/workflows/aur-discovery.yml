name: Refresh AUR discovery buckets

# Regenerates arch/aur_discovery.json from the AUR metadata dump and commits it when it changes.
# Atlas's Browse view fetches that file (see atlas docs/plans/2026-06-05-aur-discovery-buckets.md).

on:
  schedule:
    - cron: '17 5 * * *'   # daily, 05:17 UTC
  workflow_dispatch: {}      # allow manual runs

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate aur_discovery.json
        run: python3 arch/generate_aur_discovery.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- arch/aur_discovery.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add arch/aur_discovery.json
          git commit -m "chore: refresh AUR discovery buckets"
          git push
